<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <defs>
    <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#A29BFE"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0.16" stdDeviation="0.32" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="8" cy="8" r="6.72" fill="url(#og)" filter="url(#shadow)"/>

  <!-- Inner ring (the "O") -->
  <circle cx="8" cy="8" r="3.4944" fill="none" stroke="#FFFFFF" stroke-width="0.64" opacity="0.9"/>

  <!-- Code cursor bar -->
  <rect x="8.52416" y="6.07808" width="0.64" height="3.8438400000000006" rx="0.32" fill="#00D4AA" opacity="0.95"/>

  <!-- Left angle bracket < -->
  <polyline points="6.4275199999999995,7.21376 5.816,8 6.4275199999999995,8.78624"
    fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Right angle bracket > -->
  <polyline points="10.27136,7.21376 10.88288,8 10.27136,8.78624"
    fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>